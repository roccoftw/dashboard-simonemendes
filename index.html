<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simone Mendes | Intelligence Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans antialiased text-gray-900">

    <header class="bg-black text-white p-5 shadow-2xl border-b-4 border-yellow-500 sticky top-0 z-50">
        <div class="max-w-[1600px] mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black tracking-tighter text-yellow-500 uppercase italic">Simone Mendes</h1>
                <p class="text-white text-[10px] font-bold uppercase tracking-[0.2em] opacity-60">Monitoramento 360° | Real-Time</p>
            </div>
            <div id="data-atual" class="text-xs font-mono bg-gray-900 px-3 py-1 rounded border border-gray-800 text-yellow-500">03/03/2026</div>
        </div>
    </header>

    <main class="max-w-[1600px] mx-auto p-4 md:p-6">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            
            <div class="space-y-4">
                <h2 class="text-lg font-black uppercase italic flex items-center gap-2">
                    <span class="w-2 h-6 bg-pink-500 rounded-full"></span> Instagram
                </h2>
                <div id="feed-instagram" class="space-y-4"></div>
            </div>

            <div class="space-y-4">
                <h2 class="text-lg font-black uppercase italic flex items-center gap-2">
                    <span class="w-2 h-6 bg-yellow-500 rounded-full"></span> Imprensa
                </h2>
                <div id="lista-noticias" class="space-y-4"></div>
            </div>

            <div class="space-y-6">
                <h2 class="text-lg font-black uppercase italic flex items-center gap-2 text-blue-500">
                    <span class="w-2 h-6 bg-blue-500 rounded-full"></span> X Intelligence
                </h2>
                
                <section>
                    <p class="text-[10px] font-bold text-gray-400 uppercase mb-2 border-b pb-1">Últimas Postagens (@)</p>
                    <div id="x-postagens" class="space-y-2"></div>
                </section>

                <section>
                    <p class="text-[10px] font-bold text-blue-400 uppercase mb-2 border-b pb-1 border-blue-100">Menções Recentes</p>
                    <div id="x-mencoes" class="space-y-2"></div>
                </section>

                <section>
                    <p class="text-[10px] font-bold text-gray-500 uppercase mb-2 border-b pb-1">Últimos Replies</p>
                    <div id="x-replies" class="space-y-2"></div>
                </section>
            </div>
        </div>
    </main>

    <script>
        // CONFIGURAÇÃO DAS SUAS APIs APIFY
        const LINKS_X = {
            postagens: 'https://api.apify.com/v2/datasets/vzdZVcYYHfJbm0lTs/items?token=apify_api_BFPY25NKket8tQpPgp7lAmc1DQp2aA0YBu2N',
            mencoes: 'https://api.apify.com/v2/datasets/NaqpI50YRtmdjCdwM/items?token=apify_api_BFPY25NKket8tQpPgp7lAmc1DQp2aA0YBu2N',
            replies: 'https://api.apify.com/v2/datasets/Ziz6IJNTpTitU3M6a/items?token=apify_api_BFPY25NKket8tQpPgp7lAmc1DQp2aA0YBu2N'
        };

        const API_INSTA = 'https://api.apify.com/v2/datasets/jShBgGCJ09CJFJdnb/items?token=apify_api_BFPY25NKket8tQpPgp7lAmc1DQp2aA0YBu2N';

        async function carregarSecaoX(url, containerId, bgColor = 'bg-white') {
            const container = document.getElementById(containerId);
            try {
                const response = await fetch(url + '&clean=true&format=json');
                const data = await response.json();
                container.innerHTML = '';
                
                if (data.length === 0) {
                    container.innerHTML = '<p class="text-[9px] text-gray-400 italic">Sem novos dados nesta categoria.</p>';
                    return;
                }

                data.slice(0, 4).forEach(t => {
                    // Tenta encontrar o link ou monta pelo ID
                    const tweetId = t.rest_id || t.id_str;
                    const screenName = t.user?.screen_name || 'simonemendes';
                    const link = t.url || t.link || `https://x.com/${screenName}/status/${tweetId}`;
                    
                    container.innerHTML += `
                        <div class="${bgColor} p-3 rounded-lg border shadow-sm group transition hover:border-blue-400">
                            <p class="text-[11px] leading-tight mb-2">${t.full_text || t.text}</p>
                            <a href="${link}" target="_blank" class="text-[9px] font-bold text-blue-500 uppercase tracking-tighter hover:underline">Ver no X →</a>
                        </div>`;
                });
            } catch (e) { 
                container.innerHTML = '<p class="text-[9px] text-red-400 italic font-bold">Aguardando execução no Apify...</p>'; 
            }
        }

        async function carregarInstagram() {
            const container = document.getElementById('feed-instagram');
            try {
                const response = await fetch(API_INSTA);
                const posts = await response.json();
                container.innerHTML = '';
                posts.slice(0, 4).forEach(post => {
                    const img = `https://images.weserv.nl/?url=${encodeURIComponent(post.displayUrl)}&w=500&fit=cover`;
                    container.innerHTML += `
                        <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
                            <a href="${post.url}" target="_blank"><img src="${img}" class="w-full h-40 object-cover hover:opacity-90 transition"></a>
                            <div class="p-2 text-[10px] text-gray-500 line-clamp-1 italic">"${post.caption || ''}"</div>
                        </div>`;
                });
            } catch (e) { console.error(e); }
        }

        async function buscarNoticias() {
            const container = document.getElementById('lista-noticias');
            const rssUrl = encodeURIComponent('https://news.google.com/rss/search?q=allintitle:"Simone+Mendes"+when:1d&hl=pt-BR&gl=BR&ceid=BR:pt-419');
            const apiLink = `https://api.rss2json.com/v1/api.json?rss_url=${rssUrl}`;
            try {
                const response = await fetch(apiLink);
                const data = await response.json();
                if (data.status === 'ok') {
                    const ordenadas = data.items.sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate));
                    container.innerHTML = '';
                    ordenadas.slice(0, 8).forEach(item => {
                        const portalUrl = new URL(item.link).hostname;
                        container.innerHTML += `
                            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 hover:border-yellow-500 transition">
                                <div class="flex items-center gap-2 mb-2">
                                    <img src="https://www.google.com/s2/favicons?domain=${portalUrl}&sz=64" class="w-4 h-4 rounded shadow-sm">
                                    <span class="text-[9px] font-black text-gray-400 uppercase tracking-tighter">${item.author || 'Portal'}</span>
                                </div>
                                <h3 class="font-bold text-gray-900 text-[12px] leading-tight mb-2">${item.title}</h3>
                                <a href="${item.link}" target="_blank" class="text-[10px] font-black text-black border-b-2 border-yellow-500 italic uppercase tracking-tighter hover:text-yellow-600 transition">Ler Manchete</a>
                            </div>`;
                    });
                }
            } catch (e) { console.error(e); }
        }

        // INICIALIZAÇÃO
        carregarInstagram();
        buscarNoticias();
        carregarSecaoX(LINKS_X.postagens, 'x-postagens');
        carregarSecaoX(LINKS_X.mencoes, 'x-mencoes', 'bg-blue-50');
        carregarSecaoX(LINKS_X.replies, 'x-replies');
    </script>
</body>
</html>
