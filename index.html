<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Simone Mendes | Inteligência</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans antialiased">

    <header class="bg-black text-white p-6 shadow-2xl border-b-4 border-yellow-500 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-black tracking-tighter text-yellow-500">SIMONE MENDES</h1>
                <p class="text-white text-[10px] font-bold uppercase tracking-widest opacity-70">Monitoramento Real-Time</p>
            </div>
            <div class="bg-gray-800 px-4 py-2 rounded-lg border border-gray-700 text-sm font-bold" id="data-atual"></div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-6">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <div class="lg:col-span-4 space-y-6">
                <h2 class="text-xl font-bold text-gray-800 flex items-center gap-2">
                    <span class="w-2 h-6 bg-pink-500 rounded-full"></span> Feed Instagram
                </h2>
                <div id="feed-instagram" class="grid grid-cols-1 gap-6">
                    <div class="col-span-full py-10 text-center">
                        <div class="animate-spin inline-block w-6 h-6 border-2 border-pink-500 border-t-transparent rounded-full mb-2"></div>
                        <p class="text-gray-400 text-xs">Carregando mídia...</p>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-8 space-y-6">
                <h2 class="text-xl font-bold text-gray-800 flex items-center gap-2">
                    <span class="w-2 h-6 bg-yellow-500 rounded-full"></span> Últimas da Imprensa
                </h2>
                <div id="lista-noticias" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="col-span-full py-10 text-center text-gray-500 italic text-sm">Buscando notícias...</div>
                </div>
            </div>
        </div>
    </main>

    <script>
        document.getElementById('data-atual').innerText = new Date().toLocaleDateString('pt-BR');

        const APIFY_URL = 'https://api.apify.com/v2/datasets/jShBgGCJ09CJFJdnb/items?token=apify_api_BFPY25NKket8tQpPgp7lAmc1DQp2aA0YBu2N';

        async function carregarInstagram() {
            const container = document.getElementById('feed-instagram');
            try {
                const response = await fetch(APIFY_URL);
                const posts = await response.json();
                
                container.innerHTML = '';
                posts.slice(0, 4).forEach(post => {
                    const originalImg = post.displayUrl || post.thumbnailUrl;
                    // MÁGICA: Passamos a imagem por um Proxy para quebrar o bloqueio do Instagram
                    const proxyImg = `https://images.weserv.nl/?url=${encodeURIComponent(originalImg)}&w=500&h=500&fit=cover`;

                    if (originalImg) {
                        container.innerHTML += `
                            <div class="bg-white rounded-xl shadow-md border border-gray-200 overflow-hidden group hover:shadow-lg transition">
                                <div class="h-64 overflow-hidden">
                                    <img src="${proxyImg}" class="w-full h-full object-cover group-hover:scale-105 transition duration-500 shadow-inner">
                                </div>
                                <div class="p-4">
                                    <p class="text-[11px] text-gray-600 line-clamp-2 italic mb-3">"${post.caption || 'Sem legenda'}"</p>
                                    <div class="flex justify-between items-center border-t pt-3">
                                        <span class="text-xs font-bold text-pink-600">❤️ ${post.likesCount ? post.likesCount.toLocaleString() : '---'}</span>
                                        <a href="${post.url}" target="_blank" class="text-[10px] bg-black text-white px-3 py-1 rounded-full font-bold uppercase hover:bg-yellow-500 transition">Ver Original</a>
                                    </div>
                                </div>
                            </div>
                        `;
                    }
                });
            } catch (e) {
                container.innerHTML = '<div class="bg-red-50 p-4 rounded text-red-500 text-xs text-center">Erro ao carregar mídia do Instagram.</div>';
            }
        }

        async function buscarNoticias() {
            const container = document.getElementById('lista-noticias');
            const rssUrl = encodeURIComponent('https://news.google.com/rss/search?q=Simone+Mendes+when:24h&hl=pt-BR&gl=BR&ceid=BR:pt-419');
            const apiLink = `https://api.rss2json.com/v1/api.json?rss_url=${rssUrl}`;

            try {
                const response = await fetch(apiLink);
                const data = await response.json();
                if (data.status === 'ok') {
                    container.innerHTML = '';
                    data.items.slice(0, 8).forEach(item => {
                        container.innerHTML += `
                            <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-200 hover:border-yellow-500 transition-all group">
                                <span class="bg-yellow-100 text-yellow-800 text-[10px] font-black px-2 py-1 rounded uppercase mb-2 inline-block">${item.author || 'Google News'}</span>
                                <h3 class="font-bold text-gray-900 text-sm leading-tight mb-4 group-hover:text-yellow-600 transition-colors">${item.title}</h3>
                                <a href="${item.link}" target="_blank" class="text-[11px] font-bold text-black border-b-2 border-yellow-500 pb-0.5 hover:text-yellow-600">LER MATÉRIA →</a>
                            </div>
                        `;
                    });
                }
            } catch (error) { 
                container.innerHTML = '<p class="text-red-500 col-span-full text-center">Erro nas notícias.</p>'; 
            }
        }

        carregarInstagram();
        buscarNoticias();
    </script>
</body>
</html>
