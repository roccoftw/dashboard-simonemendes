<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Simone Mendes | Inteligência</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans antialiased">

    <header class="bg-black text-white p-6 shadow-2xl border-b-4 border-yellow-500 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-black tracking-tighter text-yellow-500">SIMONE MENDES</h1>
                <p class="text-white text-[10px] font-bold uppercase tracking-widest opacity-70">Monitoramento Real-Time</p>
            </div>
            <div class="bg-gray-800 px-4 py-2 rounded-lg border border-gray-700">
                <span class="text-[10px] block text-gray-400 uppercase">Hoje</span>
                <span class="text-sm font-bold" id="data-atual"></span>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-6">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <div class="lg:col-span-4 space-y-6">
                <h2 class="text-xl font-bold text-gray-800 flex items-center gap-2">
                    <span class="w-2 h-6 bg-yellow-500 rounded-full"></span> Redes Sociais
                </h2>
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 text-center text-gray-400">
                    <p class="text-sm italic italic">Aguardando integração com Apify...</p>
                </div>
            </div>

            <div class="lg:col-span-8 space-y-6">
                <h2 class="text-xl font-bold text-gray-800 flex items-center gap-2">
                    <span class="w-2 h-6 bg-yellow-500 rounded-full"></span> Últimas da Imprensa
                </h2>
                <div id="lista-noticias" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="col-span-full py-10 text-center text-gray-500">Carregando notícias do Google...</div>
                </div>
            </div>
        </div>
    </main>

    <script>
        document.getElementById('data-atual').innerText = new Date().toLocaleDateString('pt-BR');

        async function buscarNoticias() {
            const container = document.getElementById('lista-noticias');
            // Usamos um serviço que transforma o RSS do Google News em algo que o site entende
            const rssUrl = encodeURIComponent('https://news.google.com/rss/search?q=Simone+Mendes+when:24h&hl=pt-BR&gl=BR&ceid=BR:pt-419');
            const apiLink = `https://api.rss2json.com/v1/api.json?rss_url=${rssUrl}`;

            try {
                const response = await fetch(apiLink);
                const data = await response.json();

                if (data.status === 'ok') {
                    container.innerHTML = '';
                    data.items.slice(0, 10).forEach(item => {
                        container.innerHTML += `
                            <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-200 hover:border-yellow-500 transition-all">
                                <span class="bg-yellow-100 text-yellow-800 text-[10px] font-black px-2 py-1 rounded uppercase mb-2 inline-block">
                                    ${item.author || 'Google News'}
                                </span>
                                <h3 class="font-bold text-gray-900 text-sm leading-tight mb-4">${item.title}</h3>
                                <a href="${item.link}" target="_blank" class="text-[11px] font-bold text-black border-b-2 border-yellow-500 pb-0.5 hover:text-yellow-600">
                                    LER MATÉRIA →
                                </a>
                            </div>
                        `;
                    });
                } else {
                    container.innerHTML = '<p class="text-gray-500">Sem notícias novas nas últimas 24h.</p>';
                }
            } catch (error) {
                container.innerHTML = '<p class="text-red-500">Erro ao carregar notícias.</p>';
            }
        }

        buscarNoticias();
    </script>
</body>
</html>
