<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Simone Mendes | Inteligência</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans antialiased">

    <header class="bg-black text-white p-6 shadow-2xl border-b-4 border-yellow-500 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-black tracking-tighter">SIMONE MENDES</h1>
                <p class="text-yellow-500 text-xs font-bold uppercase tracking-widest">Monitoramento de Imagem e Imprensa</p>
            </div>
            <div class="hidden md:flex gap-4">
                <div class="bg-gray-800 px-4 py-2 rounded-lg border border-gray-700">
                    <span class="text-[10px] block text-gray-400 uppercase">Atualização</span>
                    <span class="text-sm font-bold" id="data-atual">--/--/----</span>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-6">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <div class="lg:col-span-4 space-y-6">
                <h2 class="text-xl font-bold text-gray-800 flex items-center gap-2">
                    <span class="w-2 h-6 bg-yellow-500 rounded-full"></span>
                    Redes Sociais
                </h2>

                <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                    <div class="bg-gradient-to-r from-purple-600 to-pink-500 p-3 text-white flex justify-between">
                        <span class="font-bold text-sm">Instagram</span>
                        <span class="text-[10px] bg-white/20 px-2 py-1 rounded">@simonemendes</span>
                    </div>
                    <div class="p-8 text-center text-gray-400">
                        <p class="text-sm italic">Aguardando integração com Apify...</p>
                    </div>
                </div>

                <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                    <div class="bg-black p-3 text-white flex justify-between">
                        <span class="font-bold text-sm">X (Twitter)</span>
                        <span class="text-[10px] bg-white/20 px-2 py-1 rounded">@simonemendes</span>
                    </div>
                    <div class="p-8 text-center text-gray-400">
                        <p class="text-sm italic">Aguardando integração...</p>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-8 space-y-6">
                <h2 class="text-xl font-bold text-gray-800 flex items-center gap-2">
                    <span class="w-2 h-6 bg-yellow-500 rounded-full"></span>
                    Grandes Portais & Imprensa
                </h2>

                <div id="lista-noticias" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="col-span-full py-20 text-center">
                        <div class="animate-spin inline-block w-8 h-8 border-4 border-yellow-500 border-t-transparent rounded-full mb-4"></div>
                        <p class="text-gray-500 font-medium">Varrendo portais de notícias...</p>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script>
        // CONFIGURAÇÕES
        const API_KEY = 'e9606f704f4d4c3b99c7247eca2a60dc'; 
        const TERMO_BUSCA = 'Simone Mendes AND (G1 OR "Leo Dias" OR "Choquei" OR "Hugo Gloss" OR "UOL" OR "R7" OR "Extra" OR "Terra")';

        document.getElementById('data-atual').innerText = new Date().toLocaleDateString('pt-BR');

        async function buscarNoticias() {
            const container = document.getElementById('lista-noticias');
            
            try {
                const url = `https://newsapi.org/v2/everything?q=${encodeURIComponent(TERMO_BUSCA)}&sortBy=publishedAt&language=pt&apiKey=${API_KEY}`;
                const response = await fetch(url);
                const data = await response.json();

                if (data.status === 'error') {
                    container.innerHTML = `<div class="col-span-full bg-red-100 text-red-700 p-4 rounded-lg text-sm">Erro na API: Verifique se a chave ainda é válida ou se o limite gratuito excedeu.</div>`;
                    return;
                }

                container.innerHTML = '';

                if (data.articles && data.articles.length > 0) {
                    data.articles.slice(0, 10).forEach(artigo => {
                        container.innerHTML += `
                            <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-200 hover:border-yellow-500 transition-all group">
                                <div class="flex justify-between items-start mb-3">
                                    <span class="bg-yellow-100 text-yellow-800 text-[10px] font-black px-2 py-1 rounded uppercase tracking-wider">
                                        ${artigo.source.name}
                                    </span>
                                    <span class="text-gray-400 text-[10px]">
                                        ${new Date(artigo.publishedAt).toLocaleDateString('pt-BR')}
                                    </span>
                                </div>
                                <h3 class="font-bold text-gray-900 text-sm leading-tight group-hover:text-yellow-600 transition-colors">
                                    ${artigo.title}
                                </h3>
                                <p class="text-gray-500 text-xs mt-2 line-clamp-2">
                                    ${artigo.description || 'Clique para ler os detalhes da matéria.'}
                                </p>
                                <a href="${artigo.url}" target="_blank" class="inline-block mt-4 text-[11px] font-bold text-black border-b-2 border-yellow-500 pb-0.5 hover:text-yellow-600">
                                    LER MATÉRIA COMPLETA →
                                </a>
                            </div>
                        `;
                    });
                } else {
                    container.innerHTML = `<p class="col-span-full text-center text-gray-500 py-10">Nenhuma notícia encontrada com os filtros atuais.</p>`;
                }

            } catch (error) {
                container.innerHTML = `<div class="col-span-full text-center py-10 text-red-500 font-bold">Falha técnica ao carregar notícias.</div>`;
            }
        }

        buscarNoticias();
    </script>
</body>
</html>
