<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simone Mendes | Intelligence Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans antialiased text-gray-900">

    <header class="bg-black text-white p-5 shadow-2xl border-b-4 border-yellow-500 sticky top-0 z-50">
        <div class="max-w-[1600px] mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black tracking-tighter text-yellow-500 uppercase italic">Simone Mendes</h1>
                <p class="text-white text-[10px] font-bold uppercase tracking-[0.2em] opacity-60">Monitoramento 360° | Real-Time</p>
            </div>
            <div id="data-atual" class="text-xs font-mono bg-gray-900 px-3 py-1 rounded border border-gray-800 text-yellow-500"></div>
        </div>
    </header>

    <main class="max-w-[1600px] mx-auto p-4 md:p-6">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            
            <div class="space-y-4">
                <h2 class="text-lg font-black uppercase italic flex items-center gap-2">
                    <span class="w-2 h-6 bg-pink-500 rounded-full"></span> Instagram
                </h2>
                <div id="feed-instagram" class="space-y-4"></div>
            </div>

            <div class="space-y-4">
                <h2 class="text-lg font-black uppercase italic flex items-center gap-2">
                    <span class="w-2 h-6 bg-yellow-500 rounded-full"></span> Imprensa
                </h2>
                <div id="lista-noticias" class="space-y-4"></div>
            </div>

            <div class="space-y-6">
                <h2 class="text-lg font-black uppercase italic flex items-center gap-2 text-blue-500">
                    <span class="w-2 h-6 bg-blue-500 rounded-full"></span> X Official Feed
                </h2>
                <div id="x-postagens" class="space-y-4"></div>
            </div>
        </div>
    </main>

    <script>
        document.getElementById('data-atual').innerText = new Date().toLocaleDateString('pt-BR');

        const API_X_POSTS = 'https://api.apify.com/v2/datasets/vzdZVcYYHfJbm0lTs/items?token=apify_api_BFPY25NKket8tQpPgp7lAmc1DQp2aA0YBu2N';
        const API_INSTA = 'https://api.apify.com/v2/datasets/jShBgGCJ09CJFJdnb/items?token=apify_api_BFPY25NKket8tQpPgp7lAmc1DQp2aA0YBu2N';

        async function carregarX() {
            const container = document.getElementById('x-postagens');
            try {
                const response = await fetch(API_X_POSTS + '&clean=true&format=json');
                const data = await response.json();
                container.innerHTML = '';
                
                data.slice(0, 8).forEach(t => {
                    const rawDate = t.created_at || t.createdAt;
                    const dataPost = rawDate ? new Date(rawDate).toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'}) : 'Recente';
                    const tweetId = t.id_str || t.rest_id || t.id;
                    let linkFinal = t.url || t.link || (tweetId ? `https://x.com/simonemendes/status/${tweetId}` : `https://x.com/simonemendes`);
                    
                    container.innerHTML += `
                        <div class="bg-white p-4 rounded-xl border border-gray-200 shadow-sm hover:border-blue-400 transition-all">
                            <div class="flex justify-between items-start mb-2">
                                <span class="text-[9px] font-bold text-blue-500 uppercase italic">@simonemendes</span>
                                <span class="text-[9px] text-gray-400 font-mono">${dataPost}</span>
                            </div>
                            <p class="text-[12px] leading-relaxed text-gray-800 mb-3">${t.full_text || t.text || ''}</p>
                            <a href="${linkFinal}" target="_blank" class="text-[10px] font-black text-black border-b-2 border-blue-400 uppercase italic tracking-tighter hover:text-blue-600 transition">Acessar Postagem Original →</a>
                        </div>`;
                });
            } catch (e) { console.error(e); }
        }

        async function carregarInstagram() {
            const container = document.getElementById('feed-instagram');
            try {
                const response = await fetch(API_INSTA);
                const posts = await response.json();
                container.innerHTML = '';
                posts.slice(0, 4).forEach(post => {
                    const img = `https://images.weserv.nl/?url=${encodeURIComponent(post.displayUrl)}&w=500&fit=cover`;
                    container.innerHTML += `
                        <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
                            <a href="${post.url}" target="_blank"><img src="${img}" class="w-full h-48 object-cover hover:opacity-90 transition"></a>
                        </div>`;
                });
            } catch (e) { console.error(e); }
        }

        async function buscarNoticias() {
            const container = document.getElementById('lista-noticias');
            const rssUrl = encodeURIComponent('https://news.google.com/rss/search?q=allintitle:"Simone+Mendes"+when:2d&hl=pt-BR&gl=BR&ceid=BR:pt-419');
            const apiLink = `https://api.rss2json.com/v1/api.json?rss_url=${rssUrl}`;
            try {
                const response = await fetch(apiLink);
                const data = await response.json();
                if (data.status === 'ok') {
                    // ORDENAÇÃO CRONOLÓGICA REAL (Data + Hora)
                    const ordenadas = data.items.sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate));
                    
                    container.innerHTML = '';
                    ordenadas.slice(0, 10).forEach(item => {
                        const portalUrl = new URL(item.link).hostname;
                        const dataObj = new Date(item.pubDate);
                        
                        // Formatação visual da data e hora
                        const dataFormatada = dataObj.toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit'});
                        const horaFormatada = dataObj.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});

                        container.innerHTML += `
                            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 hover:border-yellow-500 transition-all group">
                                <div class="flex items-center gap-2 mb-2">
                                    <img src="https://www.google.com/s2/favicons?domain=${portalUrl}&sz=64" class="w-4 h-4 rounded shadow-sm">
                                    <span class="text-[9px] font-black text-gray-400 uppercase tracking-tighter">${item.author || 'Portal'}</span>
                                    <span class="ml-auto text-[9px] text-gray-400 italic font-bold underline decoration-yellow-500 decoration-2">${dataFormatada} • ${horaFormatada}</span>
                                </div>
                                <h3 class="font-bold text-gray-900 text-[12px] leading-tight mb-3 group-hover:text-yellow-600">${item.title}</h3>
                                <a href="${item.link}" target="_blank" class="text-[10px] font-black text-black border-b-2 border-yellow-500 uppercase italic tracking-tighter hover:text-yellow-700">Ler Manchete</a>
                            </div>`;
                    });
                }
            } catch (e) { console.error(e); }
        }

        carregarInstagram();
        buscarNoticias();
        carregarX();
    </script>
</body>
</html>
