<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Simone Mendes | Inteligência</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans antialiased">

    <header class="bg-black text-white p-6 shadow-2xl border-b-4 border-yellow-500 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-black tracking-tighter text-yellow-500 uppercase">Simone Mendes</h1>
                <p class="text-white text-[10px] font-bold uppercase tracking-widest opacity-70">Monitoramento Real-Time</p>
            </div>
            <div class="bg-gray-800 px-4 py-2 rounded-lg border border-gray-700 text-sm font-bold" id="data-atual"></div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-6">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <div class="lg:col-span-4 space-y-8">
                
                <section>
                    <h2 class="text-lg font-bold text-gray-800 flex items-center gap-2 mb-4">
                        <span class="w-2 h-6 bg-pink-500 rounded-full"></span> Instagram
                    </h2>
                    <div id="feed-instagram" class="space-y-4">
                        <p class="text-center py-4 text-gray-400 text-xs animate-pulse">Carregando fotos...</p>
                    </div>
                </section>

                <section>
                    <h2 class="text-lg font-bold text-gray-800 flex items-center gap-2 mb-4">
                        <span class="w-2 h-6 bg-blue-400 rounded-full"></span> X (Twitter)
                    </h2>
                    <div id="feed-x" class="space-y-4">
                        <p class="text-center py-4 text-gray-400 text-xs animate-pulse">Buscando tweets...</p>
                    </div>
                </section>
            </div>

            <div class="lg:col-span-8 space-y-6">
                <h2 class="text-xl font-bold text-gray-800 flex items-center gap-2">
                    <span class="w-2 h-6 bg-yellow-500 rounded-full"></span> Últimas da Imprensa
                </h2>
                <div id="lista-noticias" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="col-span-full py-10 text-center text-gray-500 italic text-sm">Carregando notícias...</div>
                </div>
            </div>
        </div>
    </main>

    <script>
        document.getElementById('data-atual').innerText = new Date().toLocaleDateString('pt-BR');

        // LINKS DOS SEUS DATASETS DO APIFY
        const API_INSTA_URL = 'https://api.apify.com/v2/datasets/jShBgGCJ09CJFJdnb/items?token=apify_api_BFPY25NKket8tQpPgp7lAmc1DQp2aA0YBu2N';
        const API_X_URL = 'https://api.apify.com/v2/datasets/DTWaPRvBEbImHUq9a/items?token=apify_api_BFPY25NKket8tQpPgp7lAmc1DQp2aA0YBu2N';

        async function carregarInstagram() {
            const container = document.getElementById('feed-instagram');
            try {
                const response = await fetch(API_INSTA_URL);
                const posts = await response.json();
                container.innerHTML = '';
                posts.slice(0, 2).forEach(post => {
                    const imgUrl = post.displayUrl || post.thumbnailUrl;
                    const proxyImg = `https://images.weserv.nl/?url=${encodeURIComponent(imgUrl)}&w=400&h=400&fit=cover`;
                    container.innerHTML += `
                        <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                            <img src="${proxyImg}" class="w-full h-48 object-cover">
                            <div class="p-3">
                                <p class="text-[10px] text-gray-500 line-clamp-2 italic">"${post.caption || 'Sem legenda'}"</p>
                            </div>
                        </div>`;
                });
            } catch (e) { container.innerHTML = 'Erro no Instagram.'; }
        }

        async function carregarX() {
            const container = document.getElementById('feed-x');
            try {
                const response = await fetch(API_X_URL);
                const tweets = await response.json();
                container.innerHTML = '';
                // Filtramos para pegar os 3 tweets mais recentes
                tweets.slice(0, 3).forEach(tweet => {
                    container.innerHTML += `
                        <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-blue-400 hover:shadow-md transition">
                            <p class="text-xs text-gray-800 font-medium mb-3 leading-relaxed">${tweet.full_text || tweet.text || 'Tweet vazio'}</p>
                            <div class="flex justify-between items-center border-t pt-2 mt-1">
                                <span class="text-[9px] text-gray-400 uppercase font-bold tracking-tighter">${tweet.created_at ? new Date(tweet.created_at).toLocaleDateString('pt-BR') : 'Postado agora'}</span>
                                <a href="${tweet.url || '#'}" target="_blank" class="text-[9px] font-black text-blue-500 hover:underline">ABRIR NO X</a>
                            </div>
                        </div>`;
                });
            } catch (e) { container.innerHTML = 'Erro ao carregar o X.'; }
        }

        async function buscarNoticias() {
            const container = document.getElementById('lista-noticias');
            const rssUrl = encodeURIComponent('https://news.google.com/rss/search?q=Simone+Mendes+when:24h&hl=pt-BR&gl=BR&ceid=BR:pt-419');
            const apiLink = `https://api.rss2json.com/v1/api.json?rss_url=${rssUrl}`;
            try {
                const response = await fetch(apiLink);
                const data = await response.json();
                if (data.status === 'ok') {
                    container.innerHTML = '';
                    data.items.slice(0, 8).forEach(item => {
                        container.innerHTML += `
                            <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-200 hover:border-yellow-500 transition-all group">
                                <span class="bg-yellow-100 text-yellow-800 text-[10px] font-black px-2 py-1 rounded uppercase mb-2 inline-block">${item.author || 'Portais'}</span>
                                <h3 class="font-bold text-gray-900 text-sm mb-3 group-hover:text-yellow-600">${item.title}</h3>
                                <a href="${item.link}" target="_blank" class="text-[11px] font-bold text-black border-b-2 border-yellow-500 pb-0.5">LER MATÉRIA →</a>
                            </div>`;
                    });
                }
            } catch (error) { container.innerHTML = 'Erro nas notícias.'; }
        }

        carregarInstagram();
        carregarX();
        buscarNoticias();
    </script>
</body>
</html>
