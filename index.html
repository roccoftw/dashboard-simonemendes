<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simone Mendes | Intelligence Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans antialiased text-gray-900">

    <header class="bg-black text-white p-5 shadow-2xl border-b-4 border-yellow-500 sticky top-0 z-50">
        <div class="max-w-[1600px] mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black tracking-tighter text-yellow-500 uppercase italic">Simone Mendes</h1>
                <p class="text-white text-[10px] font-bold uppercase tracking-[0.2em] opacity-60">Monitoramento 360° | Real-Time</p>
            </div>
            <div id="data-atual" class="text-xs font-mono bg-gray-900 px-3 py-1 rounded border border-gray-800 text-yellow-500"></div>
        </div>
    </header>

    <main class="max-w-[1600px] mx-auto p-4 md:p-6">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            
            <div class="space-y-6">
                <div class="flex items-center gap-2 mb-2">
                    <div class="w-8 h-8 bg-gradient-to-tr from-yellow-400 via-red-500 to-purple-600 rounded-lg flex items-center justify-center text-white shadow-lg">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.162 6.162 6.162 6.162-2.759 6.162-6.162-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
                    </div>
                    <h2 class="text-lg font-black uppercase italic">Instagram</h2>
                </div>
                <div>
                    <p class="text-[10px] font-bold text-pink-600 uppercase mb-3 border-b pb-1 italic">Posts Oficiais</p>
                    <div id="insta-oficial" class="space-y-4"></div>
                </div>
                <div>
                    <p class="text-[10px] font-bold text-gray-400 uppercase mb-3 border-b pb-1 italic">Menções no Feed</p>
                    <div id="insta-mencoes" class="grid grid-cols-2 gap-2"></div>
                </div>
            </div>

            <div class="space-y-4">
                <div class="flex items-center gap-2 mb-2">
                    <div class="w-8 h-8 bg-yellow-500 rounded-lg flex items-center justify-center text-black shadow-lg">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z"></path></svg>
                    </div>
                    <h2 class="text-lg font-black uppercase italic">Imprensa</h2>
                </div>
                <div id="lista-noticias" class="space-y-4"></div>
            </div>

            <div class="space-y-6">
                <div class="flex items-center gap-2 mb-2">
                    <div class="w-8 h-8 bg-black rounded-lg flex items-center justify-center text-white shadow-lg border border-gray-700">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"></path></svg>
                    </div>
                    <h2 class="text-lg font-black uppercase italic">X Intelligence</h2>
                </div>
                <div>
                    <p class="text-[10px] font-bold text-gray-400 uppercase mb-3 border-b pb-1 italic">Últimos Posts Oficiais</p>
                    <div id="feed-x-simone" class="space-y-3"></div>
                </div>
                <div>
                    <p class="text-[10px] font-bold text-blue-500 uppercase mb-3 border-b border-blue-100 pb-1 italic">Menções Recentes</p>
                    <div id="feed-x-mencoes" class="space-y-3"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        document.getElementById('data-atual').innerText = new Date().toLocaleDateString('pt-BR', {year: 'numeric', month: 'long', day: 'numeric'});

        const API_INSTA = 'https://api.apify.com/v2/datasets/jShBgGCJ09CJFJdnb/items?token=apify_api_BFPY25NKket8tQpPgp7lAmc1DQp2aA0YBu2N';
        const API_X = 'https://api.apify.com/v2/datasets/DTWaPRvBEbImHUq9a/items?token=apify_api_BFPY25NKket8tQpPgp7lAmc1DQp2aA0YBu2N';

        async function carregarInstagram() {
            const oficialCont = document.getElementById('insta-oficial');
            const mencoesCont = document.getElementById('insta-mencoes');
            try {
                const response = await fetch(API_INSTA);
                const posts = await response.json();
                
                // Organiza por data e separa em 4 e 4
                const ordenados = posts.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
                const oficiais = ordenados.slice(0, 4);
                const mencoes = ordenados.slice(4, 8);

                oficialCont.innerHTML = '';
                oficiais.forEach(post => {
                    const img = `https://images.weserv.nl/?url=${encodeURIComponent(post.displayUrl)}&w=600&fit=cover`;
                    oficialCont.innerHTML += `
                        <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
                            <a href="${post.url}" target="_blank"><img src="${img}" class="w-full h-48 object-cover hover:opacity-90 transition"></a>
                        </div>`;
                });

                mencoesCont.innerHTML = '';
                mencoes.forEach(post => {
                    const img = `https://images.weserv.nl/?url=${encodeURIComponent(post.displayUrl)}&w=300&fit=cover`;
                    mencoesCont.innerHTML += `
                        <a href="${post.url}" target="_blank" class="block bg-gray-200 rounded-lg overflow-hidden h-24">
                            <img src="${img}" class="w-full h-full object-cover opacity-80 hover:opacity-100 transition">
                        </a>`;
                });
            } catch (e) { console.error(e); }
        }

        async function carregarX() {
            try {
                const response = await fetch(API_X);
                const tweets = await response.json();
                const simoneCont = document.getElementById('feed-x-simone');
                const mencoesCont = document.getElementById('feed-x-mencoes');

                simoneCont.innerHTML = '';
                tweets.slice(0, 5).forEach(t => {
                    const link = t.url || `https://x.com/x/status/${t.id_str}`;
                    simoneCont.innerHTML += `
                        <div class="bg-white p-3 rounded-lg border-l-4 border-black shadow-sm">
                            <p class="text-[11px] leading-snug mb-2">${t.full_text || t.text}</p>
                            <a href="${link}" target="_blank" class="text-[9px] font-bold text-blue-500 uppercase">Ver postagem →</a>
                        </div>`;
                });

                mencoesCont.innerHTML = '';
                tweets.slice(5, 10).forEach(t => {
                    const link = t.url || `https://x.com/x/status/${t.id_str}`;
                    mencoesCont.innerHTML += `
                        <div class="bg-blue-50 p-3 rounded-lg border border-blue-100 shadow-sm">
                            <p class="text-[10px] leading-tight text-gray-600 mb-2">${t.full_text || t.text}</p>
                            <a href="${link}" target="_blank" class="text-[8px] font-bold text-blue-400 uppercase underline tracking-tighter">Abrir Menção</a>
                        </div>`;
                });
            } catch (e) { console.error(e); }
        }

        async function buscarNoticias() {
            const container = document.getElementById('lista-noticias');
            const rssUrl = encodeURIComponent('https://news.google.com/rss/search?q=allintitle:"Simone+Mendes"+when:1d&hl=pt-BR&gl=BR&ceid=BR:pt-419');
            const apiLink = `https://api.rss2json.com/v1/api.json?rss_url=${rssUrl}`;
            
            try {
                const response = await fetch(apiLink);
                const data = await response.json();
                if (data.status === 'ok') {
                    const ordenadas = data.items.sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate));
                    container.innerHTML = '';
                    ordenadas.slice(0, 8).forEach(item => {
                        const portalUrl = new URL(item.link).hostname;
                        const logo = `https://www.google.com/s2/favicons?domain=${portalUrl}&sz=64`; 
                        const hora = new Date(item.pubDate).toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});

                        container.innerHTML += `
                            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 hover:border-yellow-500 transition-all">
                                <div class="flex items-center gap-2 mb-2">
                                    <img src="${logo}" class="w-4 h-4 rounded shadow-sm">
                                    <span class="text-[9px] font-black text-gray-400 uppercase tracking-tighter">${item.author || 'Notícia'}</span>
                                    <span class="ml-auto text-[9px] text-gray-300 italic font-bold">${hora}</span>
                                </div>
                                <h3 class="font-bold text-gray-900 text-[12px] leading-tight mb-3">${item.title}</h3>
                                <a href="${item.link}" target="_blank" class="text-[10px] font-black text-black border-b-2 border-yellow-500 uppercase italic">Ler Manchete</a>
                            </div>`;
                    });
                }
            } catch (e) { console.error(e); }
        }

        carregarInstagram();
        carregarX();
        buscarNoticias();
    </script>
</body>
</html>
