<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simone Mendes | Intelligence Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans antialiased">

    <header class="bg-black text-white p-5 shadow-2xl border-b-4 border-yellow-500 sticky top-0 z-50">
        <div class="max-w-[1600px] mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black tracking-tighter text-yellow-500 uppercase italic">Simone Mendes</h1>
                <p class="text-[9px] font-bold uppercase tracking-[0.2em] opacity-60">Monitoramento Real-Time 360°</p>
            </div>
            <div id="data-atual" class="text-xs font-mono bg-gray-900 px-3 py-1 rounded border border-gray-800 text-yellow-500"></div>
        </div>
    </header>

    <main class="max-w-[1600px] mx-auto p-4 md:p-6">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            
            <div class="space-y-4">
                <div class="flex items-center gap-2 mb-2">
                    <div class="w-8 h-8 bg-gradient-to-tr from-yellow-400 via-red-500 to-purple-600 rounded-lg flex items-center justify-center text-white shadow-lg">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.162 6.162 6.162 6.162-2.759 6.162-6.162-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
                    </div>
                    <h2 class="text-lg font-black text-gray-800 uppercase italic">Instagram</h2>
                </div>
                <div id="feed-instagram" class="grid grid-cols-1 gap-4"></div>
            </div>

            <div class="space-y-4">
                <div class="flex items-center gap-2 mb-2">
                    <div class="w-8 h-8 bg-yellow-500 rounded-lg flex items-center justify-center text-black shadow-lg">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z"></path></svg>
                    </div>
                    <h2 class="text-lg font-black text-gray-800 uppercase italic">Últimas Notícias</h2>
                </div>
                <div id="lista-noticias" class="space-y-4"></div>
            </div>

            <div class="space-y-6">
                <div class="flex items-center gap-2 mb-2">
                    <div class="w-8 h-8 bg-black rounded-lg flex items-center justify-center text-white shadow-lg border border-gray-700">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"></path></svg>
                    </div>
                    <h2 class="text-lg font-black text-gray-800 uppercase italic">X / Twitter</h2>
                </div>

                <div class="space-y-6">
                    <div>
                        <p class="text-[10px] font-bold text-gray-400 uppercase mb-3 border-b pb-1">Posts da Artista (@simonemendes)</p>
                        <div id="feed-x-simone" class="space-y-3"></div>
                    </div>
                    <div>
                        <p class="text-[10px] font-bold text-blue-500 uppercase mb-3 border-b pb-1">Menções em Tempo Real (Geral)</p>
                        <div id="feed-x-mencoes" class="space-y-3"></div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script>
        document.getElementById('data-atual').innerText = new Date().toLocaleDateString('pt-BR', {year: 'numeric', month: 'long', day: 'numeric'});

        // LINKS APIFY
        const API_INSTA = 'https://api.apify.com/v2/datasets/jShBgGCJ09CJFJdnb/items?token=apify_api_BFPY25NKket8tQpPgp7lAmc1DQp2aA0YBu2N';
        const API_X_POSTS = 'https://api.apify.com/v2/datasets/DTWaPRvBEbImHUq9a/items?token=apify_api_BFPY25NKket8tQpPgp7lAmc1DQp2aA0YBu2N';
        
        // PARA AS MENÇÕES: Cole aqui o link do dataset de busca por "Simone Mendes"
        const API_X_SEARCH = API_X_POSTS; 

        // Função para garantir que o link do post seja encontrado
        function getCleanUrl(item, platform) {
            if (platform === 'insta') {
                return item.url || `https://www.instagram.com/p/${item.shortCode}/`;
            }
            if (platform === 'x') {
                return item.url || item.link || (item.id_str ? `https://x.com/x/status/${item.id_str}` : `https://x.com/search?q=Simone%20Mendes`);
            }
        }

        async function carregarInstagram() {
            const container = document.getElementById('feed-instagram');
            try {
                const response = await fetch(API_INSTA);
                const posts = await response.json();
                container.innerHTML = '';
                posts.slice(0, 4).forEach(post => {
                    const imgUrl = `https://images.weserv.nl/?url=${encodeURIComponent(post.displayUrl || post.thumbnailUrl)}&w=500&h=500&fit=cover`;
                    const link = getCleanUrl(post, 'insta');
                    container.innerHTML += `
                        <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden group">
                            <a href="${link}" target="_blank" rel="noopener">
                                <img src="${imgUrl}" class="w-full h-56 object-cover group-hover:scale-105 transition duration-500">
                            </a>
                            <div class="p-3">
                                <p class="text-[10px] text-gray-500 line-clamp-2 mb-2 italic">"${post.caption || ''}"</p>
                                <a href="${link}" target="_blank" class="text-[10px] font-bold text-pink-600 uppercase">Ver postagem →</a>
                            </div>
                        </div>`;
                });
            } catch (e) { container.innerHTML = 'Erro Insta.'; }
        }

        async function carregarX() {
            try {
                // Posts da Artista
                const resPosts = await fetch(API_X_POSTS);
                const tweets = await resPosts.json();
                const containerSimone = document.getElementById('feed-x-simone');
                containerSimone.innerHTML = '';
                tweets.slice(0, 3).forEach(tweet => {
                    const link = getCleanUrl(tweet, 'x');
                    containerSimone.innerHTML += `
                        <div class="bg-white p-4 rounded-xl border-l-4 border-black shadow-sm group">
                            <p class="text-xs text-gray-800 leading-relaxed mb-2">${tweet.full_text || tweet.text}</p>
                            <a href="${link}" target="_blank" class="text-[9px] font-black text-blue-500 uppercase group-hover:underline">Abrir Tweet Original →</a>
                        </div>`;
                });

                // Menções em tempo real (Geral)
                const containerMencoes = document.getElementById('feed-x-mencoes');
                containerMencoes.innerHTML = '';
                // Aqui usamos os últimos do dataset de busca
                tweets.slice(0, 3).reverse().forEach(tweet => {
                    const link = getCleanUrl(tweet, 'x');
                    containerMencoes.innerHTML += `
                        <div class="bg-blue-50 p-3 rounded-xl border border-blue-100 shadow-sm">
                            <p class="text-[11px] text-gray-700 leading-tight mb-2 font-medium">${tweet.full_text || tweet.text}</p>
                            <div class="flex justify-between items-center text-[8px] font-bold text-blue-400">
                                <span>RECÉM POSTADO</span>
                                <a href="${link}" target="_blank" class="text-blue-600 underline uppercase">Ver Post</a>
                            </div>
                        </div>`;
                });
            } catch (e) { console.error('Erro X'); }
        }

        async function buscarNoticias() {
            const container = document.getElementById('lista-noticias');
            const rssUrl = encodeURIComponent('https://news.google.com/rss/search?q=Simone+Mendes+when:24h&hl=pt-BR&gl=BR&ceid=BR:pt-419');
            const apiLink = `https://api.rss2json.com/v1/api.json?rss_url=${rssUrl}`;
            try {
                const response = await fetch(apiLink);
                const data = await response.json();
                if (data.status === 'ok') {
                    container.innerHTML = '';
                    data.items.slice(0, 8).forEach(item => {
                        container.innerHTML += `
                            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200 hover:border-yellow-500 transition-all">
                                <span class="bg-yellow-100 text-yellow-900 text-[9px] font-black px-2 py-0.5 rounded uppercase mb-2 inline-block">${item.author || 'Imprensa'}</span>
                                <h3 class="font-bold text-gray-900 text-sm leading-tight mb-3">${item.title}</h3>
                                <a href="${item.link}" target="_blank" class="text-[10px] font-black text-black border-b-2 border-yellow-500">LER MATÉRIA</a>
                            </div>`;
                    });
                }
            } catch (error) { container.innerHTML = 'Erro notícias.'; }
        }

        carregarInstagram();
        carregarX();
        buscarNoticias();
    </script>
</body>
</html>
